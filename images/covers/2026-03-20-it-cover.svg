"/><line x1="0" y1="60" x2="1200" y2="60" stroke="#661199" stroke-width="0.5" opacity="0.3"/><line x1="0" y1="120" x2="1200" y2="120" stroke="#661199" stroke-width="0.5" opacity="0.3"/><line x1="0" y1="180" x2="1200" y2="180" stroke="#661199" stroke-width="0.5" opacity="0.3"/><line x1="0" y1="240" x2="1200" y2="240" stroke="#661199" stroke-width="0.5" opacity="0.3"/><line x1="0" y1="300" x2="1200" y2="300" stroke="#661199" stroke-width="0.5" opacity="0.3"/><line x1="0" y1="360" x2="1200" y2="360" stroke="#661199" stroke-width="0.5" opacity="0.3"/><line x1="0" y1="420" x2="1200" y2="420" stroke="#661199" stroke-width="0.5" opacity="0.3"/><line x1="0" y1="480" x2="1200" y2="480" stroke="#661199" stroke-width="0.5" opacity="0.3"/><line x1="0" y1="540" x2="1200" y2="540" stroke="#661199" stroke-width="0.5" opacity="0.3"/><line x1="0" y1="600" x2="1200" y2="600" stroke="#661199" stroke-width="0.5" opacity="0.3"/>

